<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/assets/images/favicon.JPG" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password — Brandbae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800" rel="stylesheet" />
    <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
    <div class="card">
        <a href="/" class="logo">Brand<span>bae</span></a>

        <div id="formView">
            <h1>Forgot password?</h1>
            <p class="sub">Enter the email on your creator account and we'll send you a reset link.</p>

            <div id="errorBox" class="error"></div>

            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="email" placeholder="you@email.com" autocomplete="email" />
            </div>

            <button class="submit-btn" id="submitBtn" onclick="sendReset()">Send reset link →</button>
            <a href="/login/creator" class="back-link">← Back to login</a>
        </div>

        <div class="success" id="successView">
            <div class="success-icon">📬</div>
            <h2>Check your inbox</h2>
            <p>If that email is registered on Brandbae, you'll receive a reset link shortly. Check your spam folder if you don't see it within a minute.</p>
            <a href="/login/creator" class="back-link" style="margin-top:24px">← Back to login</a>
        </div>
    </div>

    <script>
        document.getElementById("email").addEventListener("keydown", e => {
            if (e.key === "Enter") sendReset();
        });

        async function sendReset() {
            const btn    = document.getElementById("submitBtn");
            const errBox = document.getElementById("errorBox");
            const email  = document.getElementById("email").value.trim();

            errBox.style.display = "none";

            if (!email) {
                errBox.textContent   = "Please enter your email address.";
                errBox.style.display = "block";
                return;
            }

            btn.disabled    = true;
            btn.textContent = "Sending…";

            try {
                const res  = await fetch("/auth/forgot-password", {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({ email }),
                });
                const json = await res.json();

                if (!res.ok) {
                    errBox.textContent   = json.error || "Something went wrong.";
                    errBox.style.display = "block";
                    return;
                }

                document.getElementById("formView").style.display    = "none";
                document.getElementById("successView").style.display = "block";
            } catch {
                errBox.textContent   = "Network error. Please try again.";
                errBox.style.display = "block";
            } finally {
                btn.disabled    = false;
                btn.textContent = "Send reset link →";
            }
        }
    </script>
</body>
</html>
