<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/assets/images/favicon.JPG" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Discover and connect with verified Instagram creators across India. Browse by niche, engagement, and city." />
    <title>Browse Creators — Brandbae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=Instrument+Serif:ital@1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/marketplace.css" />
</head>
<body>

    <nav>
        <a href="/" class="logo">Brand<span>bae.</span></a>
        <div class="nav-search">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="8" /><path d="M21 21l-4.35-4.35" />
            </svg>
            <input type="text" id="searchInput" placeholder="Search by niche, city, name…" oninput="applyFilters()" autocomplete="off" />
        </div>
        <div class="nav-right">
            <a href="/" class="btn btn-ghost">← Home</a>
        </div>
    </nav>

    <div class="page-header">
        <div class="page-header-inner">
            <div class="breadcrumb">
                <a href="/" style="color:inherit;text-decoration:none">Brandbae</a>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
                Creators
            </div>
            <h1 class="page-title">Find your next <em>creator.</em></h1>
            <p class="results-count" id="resultsCount">Loading creators…</p>
        </div>
    </div>

    <div class="filters-bar" role="search" aria-label="Filter creators">
        <div class="filters-inner">
            <div class="filters-left">
                <span class="filter-label" aria-hidden="true">Niche</span>
                <div class="filter-group" id="nicheFilters" role="group" aria-label="Filter by niche">
                    <button class="niche-chip active" data-niche="All"  onclick="setNiche(this)">All</button>
                    <button class="niche-chip" data-niche="Food"        onclick="setNiche(this)">Food</button>
                    <button class="niche-chip" data-niche="Fashion"     onclick="setNiche(this)">Fashion</button>
                    <button class="niche-chip" data-niche="Fitness"     onclick="setNiche(this)">Fitness</button>
                    <button class="niche-chip" data-niche="Travel"      onclick="setNiche(this)">Travel</button>
                    <button class="niche-chip" data-niche="Beauty"      onclick="setNiche(this)">Beauty</button>
                    <button class="niche-chip" data-niche="Tech"        onclick="setNiche(this)">Tech</button>
                    <button class="niche-chip" data-niche="Lifestyle"   onclick="setNiche(this)">Lifestyle</button>
                    <button class="niche-chip" data-niche="Gaming"      onclick="setNiche(this)">Gaming</button>
                    <button class="niche-chip" data-niche="Finance"     onclick="setNiche(this)">Finance</button>
                    <button class="niche-chip" data-niche="Comedy"      onclick="setNiche(this)">Comedy</button>
                </div>
            </div>
            <div class="filters-right">
                <select class="sort-select" id="sortFilter" onchange="applyFilters()" aria-label="Sort creators">
                    <option value="default">Sort: Trending</option>
                    <option value="engagement">Highest Engagement</option>
                    <option value="followers-high">Most Followers</option>
                    <option value="views">Most Reel Views</option>
                </select>
            </div>
        </div>
    </div>

    <main class="grid-wrap">
        <div class="creators-grid" id="creatorsGrid" role="list" aria-label="Creators"></div>
    </main>

    <script src="/js/marketplace.js"></script>
</body>
</html>
