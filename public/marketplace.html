<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/jpeg" href="/assets/images/favicon.JPG" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Browse Creators — Brandbae</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="/css/marketplace.css" />
    </head>
    <body>
        <nav>
            <a href="/" class="logo">Brand<span>bae.</span></a>
            <div class="nav-search">
                <svg
                    width="14"
                    height="14"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                    stroke-width="2"
                >
                    <circle cx="11" cy="11" r="8" />
                    <path d="M21 21l-4.35-4.35" />
                </svg>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search by niche, city..."
                    oninput="applyFilters()"
                />
            </div>
            <div class="nav-right">
                <a href="/" class="btn btn-ghost">← Back</a>
            </div>
        </nav>

        <div class="filters-bar">
            <div class="filters-inner">
                <div class="filter-label">Niche</div>
                <div class="filter-group" id="nicheFilters">
                    <button class="niche-chip active" data-niche="All" onclick="setNiche(this)">All</button>
                    <button class="niche-chip" data-niche="Food" onclick="setNiche(this)">🍔 Food</button>
                    <button class="niche-chip" data-niche="Fashion" onclick="setNiche(this)">👗 Fashion</button>
                    <button class="niche-chip" data-niche="Fitness" onclick="setNiche(this)">💪 Fitness</button>
                    <button class="niche-chip" data-niche="Travel" onclick="setNiche(this)">✈️ Travel</button>
                    <button class="niche-chip" data-niche="Beauty" onclick="setNiche(this)">💄 Beauty</button>
                    <button class="niche-chip" data-niche="Tech" onclick="setNiche(this)">📱 Tech</button>
                    <button class="niche-chip" data-niche="Lifestyle" onclick="setNiche(this)">🌿 Lifestyle</button>
                    <button class="niche-chip" data-niche="Gaming" onclick="setNiche(this)">🎮 Gaming</button>
                    <button class="niche-chip" data-niche="Finance" onclick="setNiche(this)">💹 Finance</button>
                    <button class="niche-chip" data-niche="Comedy" onclick="setNiche(this)">😂 Comedy</button>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-label">Followers</div>
                <select class="filter-select" id="followersFilter" onchange="applyFilters()">
                    <option value="all">All sizes</option>
                    <option value="1000-3000">1K – 3K</option>
                    <option value="3000-7000">3K – 7K</option>
                    <option value="7000-10000">7K – 10K</option>
                    <option value="10000-15000">10K – 15K</option>
                    <option value="15000-20000">15K – 20K</option>
                </select>
                <div class="filter-divider"></div>
                <div class="filter-label">Collab</div>
                <select class="filter-select" id="barterFilter" onchange="applyFilters()">
                    <option value="all">All types</option>
                    <option value="barter">🤝 Barter only</option>
                    <option value="paid">💰 Paid only</option>
                </select>
                <div class="filter-divider"></div>
                <div class="filter-label">Sort</div>
                <select class="filter-select" id="sortFilter" onchange="applyFilters()">
                    <option value="default">Featured</option>
                    <option value="engagement">Highest Engagement</option>
                    <option value="views">Most Reel Views</option>
                    <option value="price-low">Lowest Price</option>
                    <option value="followers-high">Most Followers</option>
                </select>
            </div>
        </div>

        <div class="results-header">
            <div class="results-count" id="resultsCount">
                Showing <strong>200 creators</strong> <span>· India</span>
            </div>
        </div>

        <div class="grid-wrap">
            <div class="creators-grid" id="creatorsGrid">
                <div class="loading-state" id="loadingState">
                    <div class="loading-spinner"></div>
                    <p>Finding creators for you…</p>
                </div>
            </div>
        </div>

        <script src="/js/marketplace.js"></script>
    </body>
</html>
