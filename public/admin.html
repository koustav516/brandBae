<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/assets/images/favicon.JPG" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Brandbae</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800" rel="stylesheet" />
    <link rel="stylesheet" href="/css/admin.css" />
</head>
<body>

    <div id="authWall" class="auth-wall">
        <div class="auth-card">
            <div class="logo">Brand<span>bae</span> <span class="admin-tag">Admin</span></div>
            <h2>Sign in</h2>
            <div class="field">
                <label>Email</label>
                <input type="email" id="adminEmail" placeholder="adminbrandbae@gmail.com" autocomplete="email" />
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="adminPw" placeholder="Password" autocomplete="current-password" />
            </div>
            <div id="authError" class="form-error" style="display:none"></div>
            <button class="submit-btn" id="authBtn" onclick="adminLogin()">Enter →</button>
        </div>
    </div>

    <div id="adminApp" style="display:none">

        <header class="admin-header">
            <div class="admin-logo">Brand<span>bae</span> <span class="admin-tag">Admin</span></div>
            <div class="admin-header-right">
                <span id="pendingBadge" class="pending-badge" style="display:none"></span>
                <button class="logout-btn" onclick="adminLogout()">Log out</button>
            </div>
        </header>

        <div class="admin-body">
            <div class="admin-tabs">
                <button class="tab active" data-tab="pending" onclick="switchTab('pending')">Pending</button>
                <button class="tab" data-tab="approved" onclick="switchTab('approved')">Approved</button>
                <button class="tab" data-tab="rejected" onclick="switchTab('rejected')">Rejected</button>
                <button class="tab" data-tab="updates" onclick="switchTab('updates')">Updates <span id="updatesBadge" style="display:none;background:#e53e3e;color:#fff;font-size:10px;font-weight:700;border-radius:100px;padding:1px 6px;margin-left:4px;"></span></button>
            </div>

            <div id="appList" class="app-list">
                <div class="loading">Loading applications…</div>
            </div>
        </div>

    </div>

    <script>
        let allApps  = [];
        let activeTab = "pending";

        // On load, check if already authenticated via cookie
        window.addEventListener("DOMContentLoaded", async () => {
            const res = await fetch("/auth/me").catch(() => null);
            if (res && res.ok) {
                const user = await res.json();
                if (user.role === "admin") {
                    showApp();
                    loadApplications();
                }
            }
        });

        async function adminLogin() {
            const btn      = document.getElementById("authBtn");
            const errBox   = document.getElementById("authError");
            const email    = document.getElementById("adminEmail").value.trim();
            const password = document.getElementById("adminPw").value;

            errBox.style.display = "none";

            if (!email || !password) {
                errBox.textContent = "Please enter your email and password.";
                errBox.style.display = "block";
                return;
            }

            btn.disabled    = true;
            btn.textContent = "Signing in…";

            try {
                const res = await fetch("/auth/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });
                const json = await res.json();

                if (!res.ok) {
                    errBox.textContent = json.error || "Login failed.";
                    errBox.style.display = "block";
                    return;
                }

                showApp();
                loadApplications();
            } catch {
                errBox.textContent = "Network error. Is the server running?";
                errBox.style.display = "block";
            } finally {
                btn.disabled    = false;
                btn.textContent = "Enter →";
            }
        }

        // Allow Enter key on both fields
        ["adminEmail", "adminPw"].forEach(id =>
            document.getElementById(id).addEventListener("keydown", e => {
                if (e.key === "Enter") adminLogin();
            })
        );

        function showApp() {
            document.getElementById("authWall").style.display = "none";
            document.getElementById("adminApp").style.display  = "block";
        }

        async function adminLogout() {
            await fetch("/auth/logout", { method: "POST" }).catch(() => {});
            document.getElementById("authWall").style.display = "flex";
            document.getElementById("adminApp").style.display  = "none";
            document.getElementById("adminEmail").value = "";
            document.getElementById("adminPw").value    = "";
        }

        async function loadApplications() {
            try {
                const res = await fetch("/api/admin/applications");
                if (res.status === 401 || res.status === 403) {
                    document.getElementById("appList").innerHTML =
                        `<div class="empty">Session expired. Please log in again.</div>`;
                    document.getElementById("authWall").style.display = "flex";
                    document.getElementById("adminApp").style.display  = "none";
                    return;
                }
                allApps = await res.json();
                renderApps();
                updatePendingBadge();
            } catch {
                document.getElementById("appList").innerHTML =
                    `<div class="empty">Failed to load. Is the server running?</div>`;
            }
        }

        function updatePendingBadge() {
            const count = allApps.filter(a => a.status === "pending").length;
            const badge = document.getElementById("pendingBadge");
            badge.textContent   = count + " pending";
            badge.style.display = count > 0 ? "inline-block" : "none";

            const updateCount = allApps.filter(a => a.pending_followers).length;
            const ubadge = document.getElementById("updatesBadge");
            ubadge.textContent   = updateCount;
            ubadge.style.display = updateCount > 0 ? "inline" : "none";
        }

        function switchTab(tab) {
            activeTab = tab;
            document.querySelectorAll(".tab").forEach(t =>
                t.classList.toggle("active", t.dataset.tab === tab)
            );
            tab === "updates" ? renderUpdates() : renderApps();
        }

        function renderApps() {
            const filtered = allApps.filter(a => a.status === activeTab);
            const list = document.getElementById("appList");

            if (!filtered.length) {
                list.innerHTML = `<div class="empty">No ${activeTab} applications.</div>`;
                return;
            }

            list.innerHTML = filtered.map(a => `
                <div class="app-card" id="app-${a.id}">
                    <div class="app-top">
                        <div class="app-identity" style="display:flex;align-items:center;gap:12px;">
                            ${a.photo_url
                                ? `<img src="${a.photo_url}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--border);" />`
                                : `<div style="width:44px;height:44px;border-radius:50%;background:var(--blue-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--blue);">${a.full_name.charAt(0)}</div>`
                            }
                            <div>
                                <div class="app-name">${a.full_name}</div>
                                <div class="app-handle">@${a.instagram_handle}</div>
                            </div>
                        </div>
                        <div class="app-meta">
                            <span class="app-niche">${a.niche}</span>
                            <span class="app-city">📍 ${a.city}${a.state ? ", " + a.state : ""}</span>
                        </div>
                    </div>

                    <div class="app-stats">
                        <div class="app-stat">
                            <strong>${Number(a.followers).toLocaleString("en-IN")}</strong>
                            <span>Followers</span>
                        </div>
                        ${a.avg_reel_views ? `<div class="app-stat"><strong>${Number(a.avg_reel_views).toLocaleString("en-IN")}</strong><span>Avg reel views</span></div>` : ""}
                        ${a.account_age ? `<div class="app-stat"><strong>${a.account_age}</strong><span>Account age</span></div>` : ""}
                        <div class="app-stat"><strong>${a.email}</strong><span>Email</span></div>
                        <div class="app-stat">
                            <strong>${new Date(a.created_at).toLocaleDateString("en-IN")}</strong>
                            <span>Applied</span>
                        </div>
                    </div>

                    <div class="app-details">
                        ${a.languages ? `<div class="app-detail-row"><span class="detail-label">Languages</span><span>${a.languages}</span></div>` : ""}
                        ${a.niche_subcategories ? `<div class="app-detail-row"><span class="detail-label">Sub-niche</span><span>${a.niche_subcategories}</span></div>` : ""}
                        ${a.audience_age_group ? `<div class="app-detail-row"><span class="detail-label">Audience age</span><span>${a.audience_age_group}</span></div>` : ""}
                        ${a.audience_gender ? `<div class="app-detail-row"><span class="detail-label">Audience gender</span><span>${a.audience_gender}</span></div>` : ""}
                        ${a.top_locations ? `<div class="app-detail-row"><span class="detail-label">Top locations</span><span>${a.top_locations}</span></div>` : ""}
                    </div>

                    <div class="app-pricing">
                        ${a.barter
                            ? `<div class="app-price-tag barter">Barter only${a.barter_note ? " — " + a.barter_note : ""}</div>`
                            : `
                                ${a.reel_price  ? `<div class="app-price-tag"><span>Reel</span> ₹${Number(a.reel_price).toLocaleString("en-IN")}</div>` : ""}
                                ${a.story_price ? `<div class="app-price-tag"><span>Story</span> ₹${Number(a.story_price).toLocaleString("en-IN")}</div>` : ""}
                                ${a.post_price  ? `<div class="app-price-tag"><span>Post</span> ₹${Number(a.post_price).toLocaleString("en-IN")}</div>` : ""}
                              `
                        }
                        ${a.bundle_pricing ? `<div class="app-price-tag bundle"><span>Bundle</span> ${a.bundle_pricing}</div>` : ""}
                        ${a.min_deal_size  ? `<div class="app-price-tag"><span>Min deal</span> ₹${Number(a.min_deal_size).toLocaleString("en-IN")}</div>` : ""}
                    </div>

                    ${a.bio ? `<div class="app-bio">${a.bio}</div>` : ""}
                    ${a.content_links ? `<div class="app-detail-row"><span class="detail-label">Content links</span><span class="app-links">${a.content_links}</span></div>` : ""}
                    ${a.past_collabs ? `<div class="app-bio"><strong>Past collabs:</strong> ${a.past_collabs}</div>` : ""}

                    ${a.status === "pending" ? `
                        <div class="app-actions">
                            <button class="btn-approve" onclick="review(${a.id}, 'approved')">✓ Approve</button>
                            <button class="btn-reject"  onclick="review(${a.id}, 'rejected')">✕ Reject</button>
                        </div>`
                    : a.status === "approved" ? `
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:12px;">
                            <div class="app-status-tag approved">approved</div>
                            <button class="btn-edit-stats" onclick="toggleStats('${a.user_id}')">✏️ Edit Stats</button>
                        </div>
                        <div class="stats-edit-form" id="stats-${a.user_id}" style="display:none">
                            <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
                                <div id="photo-circle-${a.user_id}" onclick="document.getElementById('photo-input-${a.user_id}').click()" style="width:52px;height:52px;border-radius:10px;border:2px dashed var(--border-mid);background:${a.photo_url ? `url(${a.photo_url}) center/cover no-repeat` : 'var(--bg-soft)'};cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden;" title="Upload photo">
                                    ${a.photo_url ? '' : '📷'}
                                </div>
                                <input type="file" id="photo-input-${a.user_id}" accept="image/*" style="display:none" onchange="uploadAdminPhoto(this,'${a.user_id}')" />
                                <div>
                                    <div style="font-size:12px;font-weight:600;color:var(--ink-soft)" id="photo-status-${a.user_id}">${a.photo_url ? 'Click photo to replace' : 'Click to upload profile photo'}</div>
                                    <div style="font-size:11px;color:var(--ink-faint);margin-top:2px;">Saved when you click Save</div>
                                </div>
                                <input type="hidden" id="photo-url-${a.user_id}" value="${a.photo_url || ''}" />
                            </div>
                            <div class="stats-edit-grid">
                                <div class="stats-field">
                                    <label>Followers</label>
                                    <input type="number" min="0" id="followers-${a.user_id}" value="${a.followers || ''}" placeholder="e.g. 25000" />
                                </div>
                                <div class="stats-field">
                                    <label>Engagement Rate (%)</label>
                                    <input type="number" step="0.1" min="0" max="100" id="eng-${a.user_id}" value="${a.c_engagement || ''}" placeholder="e.g. 4.2" />
                                </div>
                                <div class="stats-field">
                                    <label>Avg Likes</label>
                                    <input type="number" min="0" id="likes-${a.user_id}" value="${a.c_avg_likes || ''}" placeholder="e.g. 320" />
                                </div>
                                <div class="stats-field">
                                    <label>Avg Comments</label>
                                    <input type="number" min="0" id="comments-${a.user_id}" value="${a.c_avg_comments || ''}" placeholder="e.g. 18" />
                                </div>
                                <div class="stats-field">
                                    <label>Avg Reel Views</label>
                                    <input type="number" min="0" id="views-${a.user_id}" value="${a.c_avg_reel_views || a.avg_reel_views || ''}" placeholder="e.g. 5000" />
                                </div>
                                <div class="stats-field">
                                    <label>Age Range</label>
                                    <input type="text" id="age-${a.user_id}" value="${a.c_age_range || ''}" placeholder="e.g. 18-35" />
                                </div>
                                <div class="stats-field">
                                    <label>Female %</label>
                                    <input type="number" min="0" max="100" id="female-${a.user_id}" value="${a.c_female_p || ''}" placeholder="e.g. 62" />
                                </div>
                                <div class="stats-field">
                                    <label>Male %</label>
                                    <input type="number" min="0" max="100" id="male-${a.user_id}" value="${a.c_male_p || ''}" placeholder="e.g. 38" />
                                </div>
                                <div class="stats-field stats-field-wide">
                                    <label>Top Locations (comma-separated)</label>
                                    <input type="text" id="loc-${a.user_id}" value="${a.c_locations ? a.c_locations.join(', ') : ''}" placeholder="e.g. Mumbai, Delhi, Pune" />
                                </div>
                            </div>
                            <div style="display:flex;align-items:center;gap:10px;margin-top:12px;">
                                <button class="btn-approve" onclick="saveStats('${a.user_id}')">Save</button>
                                <span class="stats-save-msg" id="msg-${a.user_id}"></span>
                            </div>
                        </div>`
                    : `<div class="app-status-tag ${a.status}">${a.status}</div>`}
                </div>
            `).join("");
        }

        function renderUpdates() {
            const list = document.getElementById("appList");
            const pending = allApps.filter(a => a.pending_followers);

            if (!pending.length) {
                list.innerHTML = `<div class="empty">No pending follower updates.</div>`;
                return;
            }

            list.innerHTML = pending.map(a => `
                <div class="app-card" id="upd-${a.user_id}">
                    <div class="app-top">
                        <div class="app-identity" style="display:flex;align-items:center;gap:12px;">
                            ${a.photo_url
                                ? `<img src="${a.photo_url}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;border:2px solid var(--border);" />`
                                : `<div style="width:44px;height:44px;border-radius:50%;background:var(--blue-light);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--blue);">${a.full_name.charAt(0)}</div>`
                            }
                            <div>
                                <div class="app-name">${a.full_name}</div>
                                <div class="app-handle">@${a.instagram_handle}</div>
                            </div>
                        </div>
                        <div class="app-meta">
                            <span class="app-niche">${a.niche}</span>
                            <span class="app-city">📍 ${a.city}</span>
                        </div>
                    </div>

                    <div class="app-stats">
                        <div class="app-stat">
                            <strong>${Number(a.followers).toLocaleString("en-IN")}</strong>
                            <span>Current followers</span>
                        </div>
                        <div class="app-stat" style="color:#3B5BDB">
                            <strong style="color:#3B5BDB">${Number(a.pending_followers).toLocaleString("en-IN")}</strong>
                            <span>Requested new count</span>
                        </div>
                        <div class="app-stat">
                            <strong style="color:${a.pending_followers > a.followers ? "#16a34a" : "#dc2626"}">
                                ${a.pending_followers > a.followers ? "+" : ""}${(a.pending_followers - a.followers).toLocaleString("en-IN")}
                            </strong>
                            <span>Change</span>
                        </div>
                        <div class="app-stat">
                            <strong>${a.email}</strong>
                            <span>Email</span>
                        </div>
                    </div>

                    <div class="app-actions">
                        <button class="btn-approve" onclick="reviewFollowerUpdate('${a.user_id}', 'approve')">✓ Approve update</button>
                        <button class="btn-reject"  onclick="reviewFollowerUpdate('${a.user_id}', 'reject')">✕ Reject</button>
                    </div>
                </div>
            `).join("");
        }

        async function reviewFollowerUpdate(userId, action) {
            const card = document.getElementById("upd-" + userId);
            card.style.opacity       = "0.5";
            card.style.pointerEvents = "none";

            try {
                const res = await fetch(`/api/admin/follower-update/${userId}`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action }),
                });
                if (!res.ok) throw new Error();

                // Clear pending_followers locally so badge updates
                const app = allApps.find(a => a.user_id === userId);
                if (app) {
                    if (action === "approve") app.followers = app.pending_followers;
                    app.pending_followers = null;
                }
                renderUpdates();
                updatePendingBadge();
            } catch {
                card.style.opacity       = "1";
                card.style.pointerEvents = "auto";
                alert("Failed to update. Try again.");
            }
        }

        const CLOUDINARY_CLOUD  = "dlqqforuy";
        const CLOUDINARY_PRESET = "girm3koi";

        async function uploadAdminPhoto(input, userId) {
            const file = input.files[0];
            if (!file) return;
            const circle = document.getElementById("photo-circle-" + userId);
            const status = document.getElementById("photo-status-" + userId);
            status.textContent = "Uploading…";
            status.style.color = "#9898AA";
            try {
                const fd = new FormData();
                fd.append("file", file);
                fd.append("upload_preset", CLOUDINARY_PRESET);
                const r = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: "POST", body: fd });
                const d = await r.json();
                if (!r.ok) throw new Error(d.error?.message || "Upload failed");
                document.getElementById("photo-url-" + userId).value = d.secure_url;
                circle.style.backgroundImage    = `url(${d.secure_url})`;
                circle.style.backgroundSize     = "cover";
                circle.style.backgroundPosition = "center";
                circle.textContent = "";
                status.textContent = "Ready — click Save to apply";
                status.style.color = "#16a34a";
            } catch {
                status.textContent = "Upload failed — try again";
                status.style.color = "#dc2626";
            }
        }

        function toggleStats(userId) {
            const form = document.getElementById("stats-" + userId);
            form.style.display = form.style.display === "none" ? "block" : "none";
        }

        async function saveStats(userId) {
            const get = id => document.getElementById(id + "-" + userId).value.trim();
            const msg = document.getElementById("msg-" + userId);

            const body = {
                followers:      get("followers") || null,
                engagement:     get("eng")       || null,
                avg_likes:      get("likes")     || null,
                avg_comments:   get("comments")  || null,
                avg_reel_views: get("views")     || null,
                age_range:      get("age")       || null,
                female_p:       get("female")    || null,
                male_p:         get("male")      || null,
                locations:      get("loc")       || null,
                photo_url:      document.getElementById("photo-url-" + userId).value || null,
            };

            msg.textContent = "Saving…";
            msg.style.color = "#9898AA";

            try {
                const res = await fetch(`/api/admin/creator-stats/${userId}`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body),
                });
                if (!res.ok) throw new Error();
                msg.textContent = "Saved ✓";
                msg.style.color = "#16a34a";
            } catch {
                msg.textContent = "Failed. Try again.";
                msg.style.color = "#dc2626";
            }
        }

        async function review(id, status) {
            const card = document.getElementById("app-" + id);
            card.style.opacity       = "0.5";
            card.style.pointerEvents = "none";

            try {
                const res = await fetch(`/api/admin/applications/${id}`, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ status }),
                });
                if (!res.ok) throw new Error();

                const app = allApps.find(a => a.id === id);
                if (app) app.status = status;
                renderApps();
                updatePendingBadge();
            } catch {
                card.style.opacity       = "1";
                card.style.pointerEvents = "auto";
                alert("Failed to update. Try again.");
            }
        }
    </script>
</body>
</html>
